<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Grid: Adaptive Defense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Main Menu Screen -->
        <div id="menuScreen" class="screen">
            <h1>AEGIS GRID</h1>
            <h2>Adaptive Defense</h2>
            <div class="menu-buttons">
                <button id="newGameBtn">NEW GAME</button>
                <button id="continueBtn" class="hidden">CONTINUE</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen hidden">
            <!-- HUD Top Bar -->
            <div id="hud">
                <div class="hud-left">
                    <div class="hud-item">
                        <span class="hud-icon">❤️</span>
                        <div id="healthBar" class="bar">
                            <div id="healthFill" class="bar-fill"></div>
                        </div>
                        <span id="healthText">20/20</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-icon">🪙</span>
                        <span id="goldText">100</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-icon">⚡</span>
                        <span id="energyText">0</span>
                    </div>
                </div>
                <div class="hud-center">
                    <span id="waveText">Wave 1</span>
                    <button id="startWaveBtn">▶ Start Wave</button>
                </div>
                <div class="hud-right">
                    <span id="speedBtn" class="hud-btn" title="Game Speed">1x</span>
                    <span id="pauseBtn" class="hud-btn" title="Pause">⏸</span>
                    <span id="menuBtn" class="hud-btn" title="Menu">☰</span>
                </div>
            </div>

            <!-- Canvas -->
            <canvas id="gameCanvas"></canvas>

            <!-- Tower Panel -->
            <div id="towerPanel">
                <div class="tower-btn" data-tower="basic" title="Basic Tower - 50g">
                    <div class="tower-icon basic-icon"></div>
                    <span>Basic</span>
                    <span class="tower-cost">50</span>
                </div>
                <div class="tower-btn" data-tower="splash" title="Splash Tower - 100g">
                    <div class="tower-icon splash-icon"></div>
                    <span>Splash</span>
                    <span class="tower-cost">100</span>
                </div>
                <div class="tower-btn" data-tower="slow" title="Slow Tower - 75g">
                    <div class="tower-icon slow-icon"></div>
                    <span>Slow</span>
                    <span class="tower-cost">75</span>
                </div>
                <div class="tower-btn" data-tower="sniper" title="Sniper Tower - 125g">
                    <div class="tower-icon sniper-icon"></div>
                    <span>Sniper</span>
                    <span class="tower-cost">125</span>
                </div>
                <div class="tower-btn" data-tower="support" title="Support Tower - 150g">
                    <div class="tower-icon support-icon"></div>
                    <span>Support</span>
                    <span class="tower-cost">150</span>
                </div>
                <div class="divider"></div>
                <div class="ability-btn" data-ability="airstrike" title="Airstrike - 50 Energy">
                    <span>💥</span>
                    <span>Strike</span>
                    <div id="airstrikeCooldown" class="cooldown-overlay"></div>
                </div>
                <div class="ability-btn" data-ability="freeze" title="Freeze - 40 Energy">
                    <span>❄️</span>
                    <span>Freeze</span>
                    <div id="freezeCooldown" class="cooldown-overlay"></div>
                </div>
                <div class="ability-btn" data-ability="overclock" title="Overclock - 30 Energy">
                    <span>⚙️</span>
                    <span>Boost</span>
                    <div id="overclockCooldown" class="cooldown-overlay"></div>
                </div>
            </div>

            <!-- Tower Info / Upgrade Panel -->
            <div id="towerInfo" class="hidden">
                <div class="info-header">
                    <span id="infoName">Tower</span>
                    <span id="infoClose" class="close-btn">✕</span>
                </div>
                <div class="info-stats">
                    <div>Damage: <span id="infoDamage">0</span></div>
                    <div>Speed: <span id="infoSpeed">0</span></div>
                    <div>Range: <span id="infoRange">0</span></div>
                </div>
                <div class="info-targeting">
                    <label>Target: </label>
                    <select id="infoTargeting">
                        <option value="first">First</option>
                        <option value="last">Last</option>
                        <option value="strongest">Strongest</option>
                        <option value="weakest">Weakest</option>
                    </select>
                </div>
                <div id="upgradeButtons" class="upgrade-section"></div>
                <button id="sellBtn" class="sell-btn">Sell</button>
            </div>

            <!-- Wave Preview -->
            <div id="wavePreview" class="hidden">
                <h3>Next Wave</h3>
                <div id="waveEnemies"></div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen hidden">
            <h1>CORE DESTROYED</h1>
            <h2>Game Over</h2>
            <p>Waves Survived: <span id="finalWaves">0</span></p>
            <p>Enemies Defeated: <span id="finalKills">0</span></p>
            <div class="menu-buttons">
                <button id="retryBtn">RETRY</button>
                <button id="mainMenuBtn">MAIN MENU</button>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div id="pauseOverlay" class="overlay hidden">
            <h2>PAUSED</h2>
            <button id="resumeBtn">RESUME</button>
            <button id="saveBtn">SAVE</button>
            <button id="quitBtn">QUIT TO MENU</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
