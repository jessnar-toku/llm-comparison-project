<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Menu Screen -->
        <div id="menu-screen" class="screen active">
            <h1>PONG</h1>
            <p>Choose Difficulty:</p>
            <button id="easy-btn" class="difficulty-btn">Easy</button>
            <button id="intermediate-btn" class="difficulty-btn">Intermediate</button>
            <button id="hard-btn" class="difficulty-btn">Hard</button>
        </div>

        <!-- Game Screen -->
        <canvas id="game-canvas"></canvas>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h1 id="winner-text">Player Wins!</h1>
            <p>Final Score: <span id="final-score">0 - 0</span></p>
            <button id="restart-btn" class="difficulty-btn">Play Again</button>
            <button id="menu-btn" class="difficulty-btn">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
