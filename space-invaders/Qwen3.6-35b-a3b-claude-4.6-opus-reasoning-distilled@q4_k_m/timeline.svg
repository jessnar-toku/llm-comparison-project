<svg id="timeline-svg" width="100%" xmlns="http://www.w3.org/2000/svg" class="flowchart" style="max-width: 320px; background-color: transparent;" viewBox="0 0 320 500" role="graphics-document document" aria-roledescription="flowchart-v2">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15" flood-color="#000"/>
    </filter>
  </defs>

  <!-- Node 1: Initial Game Creation -->
  <g transform="translate(160, 60)">
    <rect x="-140" y="-35" width="280" height="70" rx="6" ry="6"
          fill="#4ecdc4" stroke="#1a9c9e" stroke-width="1.5" filter="url(#shadow)"/>
    <text text-anchor="middle" y="-5" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#000">🚀 Initial Game</text>
    <text text-anchor="middle" y="18" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#000">Creation</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="95" x2="160" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 2: Fix Enemy Edge Movement -->
  <g transform="translate(160, 200)">
    <rect x="-140" y="-35" width="280" height="70" rx="6" ry="6"
          fill="#fd79a8" stroke="#e84393" stroke-width="1.5" filter="url(#shadow)"/>
    <text text-anchor="middle" y="-5" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#fff">🐛 Fix Enemy Edge</text>
    <text text-anchor="middle" y="18" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#fff">Movement</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="160" y1="235" x2="160" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 3: Fix Syntax Error -->
  <g transform="translate(160, 340)">
    <rect x="-140" y="-35" width="280" height="70" rx="6" ry="6"
          fill="#fd79a8" stroke="#e84393" stroke-width="1.5" filter="url(#shadow)"/>
    <text text-anchor="middle" y="-5" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#fff">🔧 Fix Syntax Error</text>
    <text text-anchor="middle" y="18" font-family="'Trebuchet MS', Verdana, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#fff">(Line 281)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 430)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#4ecdc4" stroke="#1a9c9e" stroke-width="1"/>
    <text x="22" y="13" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="12" fill="#555">Feature</text>

    <rect x="100" y="0" width="16" height="16" rx="3" fill="#fd79a8" stroke="#e84393" stroke-width="1"/>
    <text x="122" y="13" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="12" fill="#555">Bug Fix</text>
  </g>
</svg>
